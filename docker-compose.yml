services:
  jenkins:
    build:
      context: ./jenkins
    image: local/jenkins-docker:lts
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=America/Phoenix
    group_add:
      - "${DOCKER_GID}"

volumes:
  jenkins_home:
